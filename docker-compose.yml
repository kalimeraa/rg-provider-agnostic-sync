services:

  webserver:
    container_name: webserver
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - server
      - reverb
    ports:
      - '${APP_PORT:-8080}:80'
    volumes:
      - ./:/var/www/server
      - './docker/nginx/conf.d/:/etc/nginx/conf.d/'
    networks:
      - app-network

  server:
    container_name: server
    restart: always
    build:
      context: .
      dockerfile: ./docker/server.Dockerfile
    working_dir: /var/www/server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # BİLEREK `env_file: .env` YOK: Laravel zaten kendi Dotenv mekanizmasıyla
    # `.env`'i (veya `APP_ENV=testing` ise `.env.testing`'i) her process
    # başlangıcında dosyadan okuyor — `env_file:` bunu container'ın OS
    # process ortamına ($_SERVER dahil) PHP hiç başlamadan ÖNCE yazardı ve bu,
    # PHPUnit'in `phpunit.xml`/`--env=testing` ile yaptığı override'ları
    # $_SERVER seviyesinde SESSİZCE ezerdi (canlı doğrulandı, bkz.
    # CHANGELOG.md) — `php artisan test` bu yüzden `.env.testing`'i hiç
    # göremiyordu.
    volumes:
      - '.:/var/www/server'
      # PAYLAŞIMLI (isimli) volume — bkz. CHANGELOG.md: server/worker/reverb
      # ÜÇÜ DE bu image'ın (server.Dockerfile) aynı kopyasını çalıştırıyor,
      # yani hiçbir zaman farklı bir vendor/'a sahip olmaları anlamlı değil.
      # Bilerek anonim/ayrı volume'lar KULLANILMAZ: `composer require` sadece
      # BİRİNDE çalıştırılınca diğer ikisi eski vendor/'da kalıp
      # `bootstrap/cache/packages.php`'nin (kod ile birlikte paylaşılan) yeni
      # bir service provider'ı beklemesiyle çakışıyor, arka planda sessizce
      # fatal hataya yol açıyordu (canlı yakalandı — Horizon/scheduler
      # `Class "...ServiceProvider" not found`).
      - 'vendor_data:/var/www/server/vendor'
      - './docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini'
    networks:
      - app-network

  # Horizon (queue) VE scheduler (schedule:work) aynı container'da,
  # supervisord altında iki ayrı process olarak çalışır — bkz.
  # docker/supervisord/{supervisord.conf,horizon.conf}. Ayrı bir
  # "scheduler" container'ı YOK: uniqueness zaten job seviyesinde
  # (ShouldBeUnique) çözülüyor, iki container'a bölmenin ek bir faydası yok.
  worker:
    container_name: worker
    restart: always
    build:
      context: .
      dockerfile: ./docker/server.Dockerfile
    working_dir: /var/www/server
    command: supervisord -c /etc/supervisor/supervisord.conf
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # BİLEREK `env_file: .env` YOK: Laravel zaten kendi Dotenv mekanizmasıyla
    # `.env`'i (veya `APP_ENV=testing` ise `.env.testing`'i) her process
    # başlangıcında dosyadan okuyor — `env_file:` bunu container'ın OS
    # process ortamına ($_SERVER dahil) PHP hiç başlamadan ÖNCE yazardı ve bu,
    # PHPUnit'in `phpunit.xml`/`--env=testing` ile yaptığı override'ları
    # $_SERVER seviyesinde SESSİZCE ezerdi (canlı doğrulandı, bkz.
    # CHANGELOG.md) — `php artisan test` bu yüzden `.env.testing`'i hiç
    # göremiyordu.
    volumes:
      - '.:/var/www/server'
      # PAYLAŞIMLI (isimli) volume — bkz. CHANGELOG.md: server/worker/reverb
      # ÜÇÜ DE bu image'ın (server.Dockerfile) aynı kopyasını çalıştırıyor,
      # yani hiçbir zaman farklı bir vendor/'a sahip olmaları anlamlı değil.
      # Bilerek anonim/ayrı volume'lar KULLANILMAZ: `composer require` sadece
      # BİRİNDE çalıştırılınca diğer ikisi eski vendor/'da kalıp
      # `bootstrap/cache/packages.php`'nin (kod ile birlikte paylaşılan) yeni
      # bir service provider'ı beklemesiyle çakışıyor, arka planda sessizce
      # fatal hataya yol açıyordu (canlı yakalandı — Horizon/scheduler
      # `Class "...ServiceProvider" not found`).
      - 'vendor_data:/var/www/server/vendor'
      - './docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini'
    networks:
      - app-network

  # Dashboard'daki gerçek-zamanlı güncellemeler (sync durumu vb.) için
  # WebSocket sunucusu. Host'a doğrudan bir port açmıyor — nginx (webserver
  # container'ı) /app/ altında buraya proxy yapıyor, böylece tarayıcı sadece
  # tek bir host/port'a (APP_PORT) bağlanıyor. Şimdilik SSL yok, düz ws://.
  reverb:
    container_name: reverb
    restart: always
    build:
      context: .
      dockerfile: ./docker/server.Dockerfile
    working_dir: /var/www/server
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # BİLEREK `env_file: .env` YOK: Laravel zaten kendi Dotenv mekanizmasıyla
    # `.env`'i (veya `APP_ENV=testing` ise `.env.testing`'i) her process
    # başlangıcında dosyadan okuyor — `env_file:` bunu container'ın OS
    # process ortamına ($_SERVER dahil) PHP hiç başlamadan ÖNCE yazardı ve bu,
    # PHPUnit'in `phpunit.xml`/`--env=testing` ile yaptığı override'ları
    # $_SERVER seviyesinde SESSİZCE ezerdi (canlı doğrulandı, bkz.
    # CHANGELOG.md) — `php artisan test` bu yüzden `.env.testing`'i hiç
    # göremiyordu.
    volumes:
      - '.:/var/www/server'
      # PAYLAŞIMLI (isimli) volume — bkz. CHANGELOG.md: server/worker/reverb
      # ÜÇÜ DE bu image'ın (server.Dockerfile) aynı kopyasını çalıştırıyor,
      # yani hiçbir zaman farklı bir vendor/'a sahip olmaları anlamlı değil.
      # Bilerek anonim/ayrı volume'lar KULLANILMAZ: `composer require` sadece
      # BİRİNDE çalıştırılınca diğer ikisi eski vendor/'da kalıp
      # `bootstrap/cache/packages.php`'nin (kod ile birlikte paylaşılan) yeni
      # bir service provider'ı beklemesiyle çakışıyor, arka planda sessizce
      # fatal hataya yol açıyordu (canlı yakalandı — Horizon/scheduler
      # `Class "...ServiceProvider" not found`).
      - 'vendor_data:/var/www/server/vendor'
      - './docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini'
    networks:
      - app-network

  db:
    container_name: db
    restart: always
    image: 'mysql:8.0'
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # Testler (phpunit.xml) buraya karşı çalışır — SQLite DEĞİL, üretimle aynı
  # motor (MySQL) kullanılır ki motor-spesifik davranış farkları testlerde
  # yakalanabilsin. Ayrı bir container/port (3307) ile `db`'den izole.
  db_test:
    container_name: db_test
    restart: unless-stopped
    image: 'mysql:8.0'
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_TEST_DATABASE:-product_sync_test}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mysql_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - app-network

  # Laravel Dusk (bkz. tests/Browser/) için headless Chrome + WebDriver.
  # Yerel bir chromedriver process'i YOK — DuskTestCase::driver(), bu
  # container'a Selenium'un standart WebDriver protokolüyle bağlanır.
  # Dusk testleri GERÇEK stack'e (webserver → server → db → redis →
  # reverb) karşı çalışır — mock/fake YOK, "E2E" isminin gerektirdiği gibi
  # tarayıcıda gerçek bir sayfa render edilip gerçek bir WebSocket
  # bağlantısı kuruluyor.
  selenium:
    container_name: selenium
    image: selenium/standalone-chrome:latest
    # Resmi Selenium image'ı şu an arm64 (Apple Silicon) için yayınlanmıyor —
    # `platform: linux/amd64` ile Docker Desktop'ın emülasyonu (Rosetta)
    # üzerinden çalıştırılıyor. amd64 host'larda (ör. CI, Linux sunucu) bu
    # zaten native'dir, ek bir maliyeti yok.
    platform: linux/amd64
    shm_size: 2gb
    networks:
      - app-network

volumes:
  mysql_data:
  mysql_test_data:
  vendor_data:

networks:
  app-network:
    driver: bridge
