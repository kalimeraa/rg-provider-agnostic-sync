; ============================================================================
; Local PHP 8.2-FPM overrides — mirrors Laravel Forge prod php.ini.
; Only directives that deviate from the php:8.2-fpm image defaults are listed.
; Keep this file aligned with the Forge server /etc/php/8.2/fpm/php.ini so
; prod-specific behaviour (opcache, memory caps, error handling) reproduces
; locally.
; ============================================================================

; ----- Resource limits -----
memory_limit = 512M
max_execution_time = 60
max_input_time = 60
default_socket_timeout = 60

; ----- File uploads -----
post_max_size = 300M
upload_max_filesize = 300M
max_file_uploads = 20

; ----- Error handling -----
; display_errors ON locally (prod = Off) so PHP errors surface in the browser /
; FPM response during dev instead of being swallowed silently.
display_errors = On
display_startup_errors = On
log_errors = On
error_reporting = E_ALL
expose_php = Off

; Local deviation from prod: prod hides args in stack traces for security
; (passwords / tokens shouldn't leak into logs). Locally we want full args
; visible so debugging / Sentry payloads are useful.
zend.exception_ignore_args = Off
zend.exception_string_param_max_len = 15
zend.assertions = -1

; ----- Data handling -----
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
output_buffering = 4096

; ----- Date -----
date.timezone = UTC

; ----- Session -----
session.sid_length = 26
session.sid_bits_per_character = 5
session.gc_divisor = 1000

; ----- Realpath cache (Laravel include chain) -----
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ----- Xdebug -----
; Xdebug is install-only in Dockerfile (not auto-enabled — loading it forces
; OPcache's JIT off). Coverage'i tek komutla calistir (xdebug yalniz o run icin
; yuklenir, gunluk dev JIT'i bozulmaz):
;   docker exec server bash -c "cd /var/www/server && composer test:coverage"
;   docker exec server bash -c "cd /var/www/server && composer test:coverage -- --filter=SomeTest"
; Manuel esdeger:
;   php -dzend_extension=xdebug.so -dxdebug.mode=coverage artisan test --coverage
xdebug.mode = coverage

; ============================================================================
; OPcache — matches Forge prod values (from /etc/php/8.2/fpm/php.ini).
; ============================================================================
opcache.enable = 1

; `opcache.enable_cli` BİLEREK 0 (prod'da FPM için `opcache.enable=1` zaten
; yeterli, bu satır sadece CLI SAPI'yi etkiler): PHPUnit'in mock üretimi
; `eval()` ile çok sayıda anonim class tanımlıyor (bir test dosyasında
; 15-20+ mock class) — opcache CLI modu bunları AYNI process içinde
; cache'lemeye çalışırken canlı olarak bir segfault'a (SIGSEGV, exit 139)
; yol açtığı görüldü; sadece `--filter` ile tek tek çalıştırıldığında değil,
; TÜM dosya birlikte çalışınca ortaya çıkan, `opcache.enable_cli=0` ile
; kesin olarak tekrar üretilemeyen bir hataydı. Tek bir CLI çağrısının
; ömrü zaten sınırlı olduğu için (her `php artisan ...` ayrı bir process)
; opcache'in CLI'daki gerçek kazancı marjinal — bu riski almaya değmez.
opcache.enable_cli = 0

opcache.memory_consumption = 512
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 30000
opcache.save_comments = 1

; Local deviation from prod: prod runs with validate_timestamps=0 because
; Envoyer clears opcache on deploy. Locally we edit code live, so re-check
; file mtimes on every request (revalidate_freq=0) to pick up edits without
; needing to restart FPM or run `artisan opcache:clear`.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
