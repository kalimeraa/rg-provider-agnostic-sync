server {
    listen 80;

    server_name _;

    error_log  /var/log/nginx/server.error.log;
    access_log /var/log/nginx/server.access.log;

    root /var/www/server/public;

    index index.php index.html;

    client_max_body_size 40M;

    # Laravel Reverb (WebSocket) — dashboard'un gerçek-zamanlı bağlantısı
    # buraya, aynı host/port üzerinden (ör. ws://localhost:8080/app/KEY)
    # gelir; nginx bunu "reverb" container'ına yükseltip (upgrade) proxy'ler.
    # Şimdilik SSL yok, düz http/ws — REVERB_SCHEME=http ile tutarlı.
    location /app/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass server:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
